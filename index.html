<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Ansh Jaiswal — AR Card</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; font-family: 'Segoe UI', system-ui, sans-serif; }
    a-scene { width: 100vw; height: 100vh; }

    /* ── SCAN SCREEN ── */
    #scan-screen {
      position: fixed; inset: 0; z-index: 100;
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-end;
      padding-bottom: 60px; pointer-events: none;
      transition: opacity 0.6s ease;
    }
    #scan-screen.hidden { opacity: 0; pointer-events: none; }

    .scan-box {
      width: 220px; height: 140px;
      border: 2px solid rgba(184,155,106,0.8);
      border-radius: 12px;
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -60%);
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.45);
      animation: scanPulse 2s ease-in-out infinite;
    }
    .scan-box::before, .scan-box::after {
      content: ''; position: absolute;
      width: 20px; height: 20px;
      border-color: #b89b6a; border-style: solid;
    }
    .scan-box::before { top:-2px; left:-2px; border-width:3px 0 0 3px; border-radius:4px 0 0 0; }
    .scan-box::after  { bottom:-2px; right:-2px; border-width:0 3px 3px 0; border-radius:0 0 4px 0; }
    @keyframes scanPulse {
      0%,100% { border-color: rgba(184,155,106,0.5); }
      50%     { border-color: rgba(184,155,106,1); box-shadow: 0 0 0 9999px rgba(0,0,0,0.5), 0 0 20px rgba(184,155,106,0.3); }
    }
    .scan-line {
      position: absolute; width: 100%; height: 2px;
      background: linear-gradient(90deg, transparent, #b89b6a, transparent);
      top: 0; animation: sweep 2s ease-in-out infinite;
    }
    @keyframes sweep {
      0%   { top: 0%; opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { top: 100%; opacity: 0; }
    }
    .scan-label {
      font-size: 13px; color: rgba(255,255,255,0.85);
      letter-spacing: 2px; text-transform: uppercase;
      background: rgba(0,0,0,0.6); padding: 10px 20px;
      border-radius: 30px; border: 1px solid rgba(184,155,106,0.3);
      backdrop-filter: blur(8px);
    }

    /* ── AR OVERLAY UI ── */
    #ar-ui {
      position: fixed; inset: 0; z-index: 50;
      pointer-events: none; opacity: 0;
      transition: opacity 0.5s ease;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    #ar-ui.visible { opacity: 1; pointer-events: auto; }

    .ar-card {
      width: min(340px, 88vw);
      background: rgba(8,7,14,0.82);
      border: 1px solid rgba(184,155,106,0.35);
      border-radius: 16px; overflow: hidden;
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 0 0 1px rgba(184,155,106,0.1), 0 20px 60px rgba(0,0,0,0.7), 0 0 40px rgba(184,155,106,0.08);
      animation: cardFloat 4s ease-in-out infinite;
    }
    @keyframes cardFloat {
      0%,100% { transform: translateY(0px); }
      50%     { transform: translateY(-8px); }
    }

    .card-bar { height: 2px; background: linear-gradient(90deg, transparent, #b89b6a, #d4b98a, #b89b6a, transparent); }
    .card-body { padding: 24px 24px 20px; }

    .card-header { text-align: center; margin-bottom: 20px; }
    .card-eyebrow { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: #b89b6a; margin-bottom: 8px; }
    .card-name { font-size: 26px; font-weight: 300; color: #f7f3ee; letter-spacing: 0.5px; line-height: 1.1; }
    .card-name strong { font-weight: 600; }
    .card-role { font-size: 11px; color: rgba(184,155,106,0.7); letter-spacing: 1px; margin-top: 4px; }

    .card-divider { display: flex; align-items: center; gap: 8px; margin: 16px 0; }
    .card-divider-line { flex: 1; height: 1px; background: rgba(184,155,106,0.2); }
    .card-divider-dot { width: 4px; height: 4px; background: #b89b6a; border-radius: 50%; opacity: 0.6; }

    .btn-row { display: flex; flex-direction: column; gap: 8px; }

    .ar-btn {
      display: flex; align-items: center; gap: 12px;
      padding: 13px 16px; border-radius: 10px;
      text-decoration: none; border: 1px solid transparent;
      transition: all 0.15s ease; -webkit-tap-highlight-color: transparent;
      cursor: pointer; pointer-events: auto;
      /* CRITICAL: ensure touch events work */
      touch-action: manipulation;
    }
    .ar-btn:active { transform: scale(0.97); opacity: 0.85; }

    .btn-call     { background: rgba(255,255,255,0.04); border-color: rgba(0,255,209,0.2); }
    .btn-whatsapp { background: rgba(37,211,102,0.06); border-color: rgba(37,211,102,0.25); }
    .btn-linkedin { background: rgba(0,119,181,0.06); border-color: rgba(0,119,181,0.25); }

    .btn-call:active     { background: rgba(0,255,209,0.1); }
    .btn-whatsapp:active { background: rgba(37,211,102,0.14); }
    .btn-linkedin:active { background: rgba(0,119,181,0.14); }

    .btn-icon-wrap {
      width: 36px; height: 36px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; flex-shrink: 0;
    }
    .btn-call     .btn-icon-wrap { background: rgba(0,255,209,0.1); }
    .btn-whatsapp .btn-icon-wrap { background: rgba(37,211,102,0.12); }
    .btn-linkedin .btn-icon-wrap { background: rgba(0,119,181,0.12); }

    .btn-text-wrap { flex: 1; }
    .btn-label {
      font-size: 9px; letter-spacing: 1.5px;
      text-transform: uppercase; display: block; margin-bottom: 2px;
    }
    .btn-call     .btn-label { color: rgba(0,255,209,0.6); }
    .btn-whatsapp .btn-label { color: rgba(37,211,102,0.6); }
    .btn-linkedin .btn-label { color: rgba(0,119,181,0.7); }

    .btn-value { font-size: 13px; font-weight: 500; display: block; color: rgba(247,243,238,0.9); }
    .btn-arrow { color: rgba(255,255,255,0.2); font-size: 14px; }

    .card-footer { margin-top: 16px; display: flex; align-items: center; justify-content: center; gap: 6px; }
    .footer-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: #6bb96b; box-shadow: 0 0 6px rgba(107,185,107,0.8);
      animation: breathe 2s ease-in-out infinite;
    }
    @keyframes breathe { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    .footer-text { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: rgba(122,116,104,0.6); }

    /* Lost target badge */
    #lost-badge {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      z-index: 200; background: rgba(0,0,0,0.7); color: rgba(255,255,255,0.7);
      font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
      padding: 8px 18px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
      opacity: 0; transition: opacity 0.4s; pointer-events: none;
    }
    #lost-badge.visible { opacity: 1; }
  </style>
</head>
<body>

  <!-- SCAN SCREEN -->
  <div id="scan-screen">
    <div class="scan-box"><div class="scan-line"></div></div>
    <div class="scan-label">📷 &nbsp;Scan Business Card</div>
  </div>

  <!-- AR OVERLAY — real HTML buttons, 100% tappable on mobile -->
  <div id="ar-ui">
    <div class="ar-card">
      <div class="card-bar"></div>
      <div class="card-body">

        <div class="card-header">
          <div class="card-eyebrow">Digital Identity</div>
          <div class="card-name">Ansh <strong>Jaiswal</strong></div>
          <div class="card-role">AR Developer &amp; Tech Consultant</div>
        </div>

        <div class="card-divider">
          <div class="card-divider-line"></div>
          <div class="card-divider-dot"></div>
          <div class="card-divider-line"></div>
        </div>

        <div class="btn-row">

          <!-- CALL — use onclick for maximum mobile compatibility -->
          <a class="ar-btn btn-call" onclick="window.location.href='tel:+918218049120'; return false;" href="tel:+918218049120">
            <div class="btn-icon-wrap">📞</div>
            <div class="btn-text-wrap">
              <span class="btn-label">Direct Line</span>
              <span class="btn-value">+91 82180 49120</span>
            </div>
            <span class="btn-arrow">›</span>
          </a>

          <a class="ar-btn btn-whatsapp" onclick="window.open('https://wa.me/918218049120','_blank'); return false;" href="https://wa.me/918218049120" target="_blank">
            <div class="btn-icon-wrap">💬</div>
            <div class="btn-text-wrap">
              <span class="btn-label">WhatsApp</span>
              <span class="btn-value">Message Instantly</span>
            </div>
            <span class="btn-arrow">›</span>
          </a>

          <a class="ar-btn btn-linkedin" onclick="window.open('https://www.linkedin.com/in/ansh-jaiswal-aa766a255/','_blank'); return false;" href="https://www.linkedin.com/in/ansh-jaiswal-aa766a255/" target="_blank">
            <div class="btn-icon-wrap">🔗</div>
            <div class="btn-text-wrap">
              <span class="btn-label">LinkedIn</span>
              <span class="btn-value">View Profile &amp; Work</span>
            </div>
            <span class="btn-arrow">›</span>
          </a>

        </div>

        <div class="card-footer">
          <div class="footer-dot"></div>
          <span class="footer-text">Open to Projects &nbsp;·&nbsp; India</span>
        </div>

      </div>
    </div>
  </div>

  <div id="lost-badge">⚠ Reposition camera</div>

  <!-- A-FRAME — just camera + invisible anchor for tracking -->
  <a-scene
    mindar-image="imageTargetSrc: targets.mind;
                  autoStart: true;
                  uiLoading: yes;
                  uiError: yes;
                  uiScanning: no;
                  filterMinCF: 0.001;
                  filterBeta: 0.01;
                  missTolerance: 5;
                  warmupTolerance: 3;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    renderer="colorManagement: false">

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- Invisible plane keeps tracking alive without any 3D UI -->
    <a-entity mindar-image-target="targetIndex: 0" id="target-anchor">
      <a-plane position="0 0 0" width="1" height="0.6"
        material="opacity: 0; transparent: true; side: double">
      </a-plane>
    </a-entity>

  </a-scene>

  <script>
    const scanScreen = document.getElementById('scan-screen');
    const arUi       = document.getElementById('ar-ui');
    const lostBadge  = document.getElementById('lost-badge');
    const anchor     = document.getElementById('target-anchor');
    let lostTimer    = null;

    anchor.addEventListener('targetFound', () => {
      if (lostTimer) { clearTimeout(lostTimer); lostTimer = null; }
      scanScreen.classList.add('hidden');
      arUi.classList.add('visible');
      lostBadge.classList.remove('visible');
    });

    anchor.addEventListener('targetLost', () => {
      lostTimer = setTimeout(() => {
        arUi.classList.remove('visible');
        scanScreen.classList.remove('hidden');
        lostBadge.classList.add('visible');
        setTimeout(() => lostBadge.classList.remove('visible'), 2500);
      }, 800); // 800ms grace period avoids flicker
    });
  </script>

</body>
</html>
