<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AR Business Card</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }
  </style>
</head>

<body>
<a-scene
  mindar-image="imageTargetSrc: card.mind;"
  embedded
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false">

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity mindar-image-target="targetIndex: 0">

    <!-- NAME -->
    <a-text
      value="Ansh Jaiswal"
      color="#00FFD1"
      align="center"
      width="3"
      position="0 0.4 0">
    </a-text>

    <!-- CALL -->
    <a-plane
      position="-0.6 -0.2 0"
      width="0.6"
      height="0.25"
      color="#000"
      onclick="window.location.href='tel:+918218049120'">
      <a-text value="Call" align="center" position="0 0 0.01" color="#fff"></a-text>
    </a-plane>

    <!-- WHATSAPP -->
    <a-plane
      position="0 -0.2 0"
      width="0.9"
      height="0.25"
      color="#25D366"
      onclick="window.location.href='https://wa.me/918218049120'">
      <a-text value="WhatsApp" align="center" position="0 0 0.01" color="#fff"></a-text>
    </a-plane>

    <!-- LINKEDIN -->
    <a-plane
      position="0.7 -0.2 0"
      width="0.9"
      height="0.25"
      color="#0077B5"
      onclick="window.location.href='https://www.linkedin.com/in/ansh-jaiswal-aa766a255/'">
      <a-text value="LinkedIn" align="center" position="0 0 0.01" color="#fff"></a-text>
    </a-plane>

  </a-entity>
</a-scene>
</body>
</html>
